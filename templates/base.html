<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Salón Lilibeth Rodríguez{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-danger">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">💅 Lilibeth Rodríguez</a>

        <!-- BOTÓN PARA MOSTRAR MENÚ EN PANTALLAS PEQUEÑAS -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- CONTENIDO DEL NAV -->
        <div class="collapse navbar-collapse" id="menuNav">

            <!-- LINKS -->
            <div class="navbar-nav me-auto">
                <a class="nav-link" href="/">🏠 Inicio</a>
                <a class="nav-link" href="/about">📄 Acerca</a>
                <a class="nav-link" href="/servicios">✂️ Reservaciones</a>
                <a class="nav-link" href="/login">🔐 Login</a>
            </div>

            <!-- 🔍 BUSCADOR -->
            <form class="d-flex" action="{{ url_for('buscar') }}" method="get">
                <input 
                    class="form-control me-2" 
                    type="search" 
                    name="q" 
                    placeholder="Buscar producto"
                >
                <button class="btn btn-light" type="submit">Buscar</button>
            </form>

        </div>

    </div>
</nav>

<main class="container mt-5">
    {% block content %}{% endblock %}
</main>

<footer class="bg-dark text-white text-center py-4 mt-5">
    <p>&copy; 2026 Salón Lilibeth Rodríguez - Arenillas, El Oro, Ecuador</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
